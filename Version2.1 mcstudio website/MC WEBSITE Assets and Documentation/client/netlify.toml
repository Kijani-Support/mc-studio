[build]
  base = "main/Version2.1 mcstudio website/MC WEBSITE Assets and Documentation"
  command = "cd client && npm install && npm run build"
  publish = "client/dist"
  functions = "server/api"

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
