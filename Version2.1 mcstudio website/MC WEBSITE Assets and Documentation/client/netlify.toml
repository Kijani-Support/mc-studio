# Build configuration for Netlify deployment
[build]
  base = "Version2.1 mcstudio website/MC WEBSITE Assets and Documentation/client"
  # Installs backend dependencies at root, then builds the frontend
  command = "cd .. && npm install express serverless-http cors dotenv && cd client && npm install && npm run build"
  publish = "dist"
  # Use a relative path from the 'client' base folder
  functions = "../netlify/functions"

# Environment variables
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Development server configuration
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 5173

# Cache configuration for faster deployments
[build.cache]
  inputs = ["package.json", "package-lock.json"]
  outputs = ["node_modules"]

# Netlify Functions configuration
[functions]
  # Grab the server files located one directory up from 'client'
  included_files = ["../server/api/**"]
  node_bundler = "esbuild"

# --------------------------------------------------------
# IMPORTANT: API redirects MUST come before the SPA catch-all
# --------------------------------------------------------

# API redirect to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Redirects for SPA routing (Catch-all)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Language = ["en"]}

# API CORS headers
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"